    <script>
      // Solução de resgate: Detectar erro de carregamento de scripts (ChunkLoadError)
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT' || (e.message && e.message.includes('ChunkLoadError'))) {
          console.warn('Erro detectado no carregamento de script. Tentando atualizar a página...');
          const hasReloaded = sessionStorage.getItem('sw_reload_sync');
          if (!hasReloaded) {
            sessionStorage.setItem('sw_reload_sync', 'true');
            location.reload();
          }
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
